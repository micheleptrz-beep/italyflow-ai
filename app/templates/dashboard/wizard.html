{% extends "base.html" %}
{% block content %}
<div x-data="wizard()" class="max-w-2xl mx-auto">
  <h1 class="text-xl font-semibold mb-4">New audit</h1>
  <ol class="flex items-center gap-2 text-xs mb-6">
    <template x-for="(s, i) in steps" :key="i">
      <li class="flex items-center gap-2">
        <span class="w-6 h-6 rounded-full grid place-items-center"
              :class="step >= i+1 ? 'bg-brand text-white' : 'bg-slate-200 text-slate-600'"
              x-text="i+1"></span>
        <span x-text="s"></span>
        <span x-show="i < steps.length-1" class="w-6 h-px bg-slate-300"></span>
      </li>
    </template>
  </ol>

  <div x-show="step === 1" class="space-y-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
    <input class="w-full px-3 py-2 rounded-md border" placeholder="Product name" x-model="form.product_name" />
    <select class="w-full px-3 py-2 rounded-md border" x-model="form.category">
      <option value="oil">EVO oil</option><option value="wine">Wine</option>
      <option value="cheese">Cheese</option><option value="pasta">Pasta</option>
      <option value="generic">Other</option>
    </select>
    <input class="w-full px-3 py-2 rounded-md border" placeholder="Region (e.g. Toscana)" x-model="form.region" />
    <textarea rows="6" class="w-full px-3 py-2 rounded-md border font-mono text-xs"
              placeholder="Paste the current label text..." x-model="form.label_text"></textarea>
    <div class="flex justify-end"><button @click="step=2" class="px-3 py-2 rounded-md bg-brand text-white text-sm">Next</button></div>
  </div>

  <div x-show="step === 2" class="space-y-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
    <p class="text-sm">Select target markets:</p>
    <div class="grid grid-cols-2 gap-2">
      <template x-for="m in markets" :key="m">
        <label class="flex items-center gap-2 px-3 py-2 rounded-md border cursor-pointer">
          <input type="checkbox" :value="m" x-model="form.markets"> <span x-text="m"></span>
        </label>
      </template>
    </div>
    <div class="flex justify-between">
      <button @click="step=1" class="px-3 py-2 rounded-md border text-sm">Back</button>
      <button @click="submit()" :disabled="loading || form.markets.length===0"
              class="px-3 py-2 rounded-md bg-brand text-white text-sm disabled:opacity-50">
        <span x-show="!loading">Run audit</span><span x-show="loading">Running...</span>
      </button>
    </div>
  </div>

  <div x-show="step === 3" class="space-y-3 rounded-2xl border border-emerald-200 bg-emerald-50 dark:bg-emerald-900/20 p-5 text-center">
    <div class="text-5xl">OK</div>
    <h2 class="text-lg font-semibold">Audit completed</h2>
    <p>Overall score: <span class="font-mono" x-text="result.overall_score.toFixed(1)"></span> / 100</p>
    <a href="/dashboard/timeline" class="inline-block mt-2 px-3 py-2 rounded-md bg-brand text-white text-sm">View timeline</a>
  </div>
</div>

<script>
function wizard() {
  return {
    step: 1, loading: false,
    steps: ['Product', 'Markets', 'Result'],
    markets: ['US_FDA','CN_GB7718','CA_CFIA','JP_FLA','EU_FIR2014','UK_FIR','AE_ESMA'],
    form: { product_name: '', category: 'oil', region: '', label_text: '', markets: [] },
    result: { overall_score: 0 },
    async submit() {
      this.loading = true;
      try {
        const r = await fetch('/api/v1/dashboard/wizard', {
          method: 'POST', headers: {'Content-Type': 'application/json', 'X-User-Id': '1'},
          body: JSON.stringify({
            step1: { product_name: this.form.product_name, category: this.form.category, region: this.form.region, label_text: this.form.label_text },
            step2: { markets: this.form.markets }
          })
        });
        this.result = await r.json();
        this.step = 3;
      } finally { this.loading = false; }
    }
  }
}
</script>
{% endblock %}
